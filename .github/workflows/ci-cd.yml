name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12" # Actualizado a la versión de tu informe técnico
  NODE_VERSION: "20"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip" # Optimiza la velocidad de instalación

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript Check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Python Syntax Check
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/routers/chat.py
          python -m py_compile backend/routers/products.py
          python -m py_compile backend/routers/orders.py
          python -m py_compile backend/monitoring/__init__.py
          python -m py_compile backend/monitoring/logger.py
          python -m py_compile backend/monitoring/metrics.py

  test:
    name: Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true

  observability-checks:
    name: Observability Verification
    needs: lint-and-typecheck # Depende del primer paso para no gastar minutos si hay errores de sintaxis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SOLUCIÓN CRÍTICA: Configurar Python e instalar dependencias del Backend para poder importar los módulos
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate logging structure
        run: |
          python -c "
          import json
          sample = {
            'timestamp': '2025-01-01T00:00:00',
            'user_id': 'test',
            'prompt': 'test',
            'response_time_ms': 100,
            'tokens': 50,
            'status': 'success',
            'http_status': 200,
            'endpoint': '/api/chat'
          }
          assert json.loads(json.dumps(sample)) == sample
          print('Log structure validated')
          "

      # Corregido el bloque de imports añadiendo manejo de entorno si es necesario
      - name: Verify monitoring module imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from backend.monitoring.logger import get_logger
              from backend.monitoring.metrics import MetricsCollector
              from backend.monitoring.security import Sanitizer, RateLimiter
              from backend.monitoring.cache import ResponseCache
              print('All monitoring modules import successfully')
          except ImportError as e:
              print(f'Import failed: {e}')
              sys.exit(1)
          "

      - name: Test sanitization
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from backend.monitoring.security import Sanitizer
          clean = Sanitizer.sanitize_input(\"SELECT * FROM users; DROP TABLE products;\")
          assert '[FILTERED]' in clean or clean != \"SELECT * FROM users; DROP TABLE products;\", 'SQL injection not filtered'
          print('Sanitization working correctly')
          "

  build-and-push:
    name: Build Docker Images
    needs: [test, observability-checks] # No construye imágenes a menos que las pruebas de observabilidad pasen
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t pcfactory-api:latest -f Dockerfile.api .

      - name: Build Dashboard image
        run: docker build -t pcfactory-dashboard:latest -f Dockerfile.observability .

      - name: Verify images
        run: docker images | grep pcfactory